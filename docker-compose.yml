services:
  postgres:
    image: postgres:16-alpine
    container_name: wee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wee_password}
      POSTGRES_DB: ${POSTGRES_DB:-wee_flights}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wee_user} -d ${POSTGRES_DB:-wee_flights}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
